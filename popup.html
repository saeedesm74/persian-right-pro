<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="popup.css">
  <title>Persian Right Pro</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>Persian Right Pro</h1>
      <p class="subtitle">بهینه‌ساز هوشمند فارسی برای هوش مصنوعی</p>
    </header>

    <div class="panel">
      <div class="row">
        <span>فعال‌سازی افزونه</span>
        <label class="switch">
          <input type="checkbox" id="toggleEnabled">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="support">
      <h3>🙏 حمایت مالی</h3>
      <p>اگر این افزونه برات مفید بود، خوشحال می‌شم حمایت کنی:</p>

      <div class="card-mock">
        <div class="chip">
          <div class="chip-line-h"></div>
          <div class="chip-line-v"></div>
          <div class="chip-line-l"></div>
          <div class="chip-line-r"></div>
        </div>
        <div class="card-number" id="cardNumber">5859 8311 5438 7871</div>
        <div class="card-footer-row">
          <span class="card-label">Persian Right Pro</span>
          <button class="btn-copy" id="copyBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="12" height="12" rx="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            <span id="copyText">کپی شماره کارت</span>
          </button>
        </div>
      </div>
    </div>

    <footer>
      <span>v2.0.0 | ساخته شده توسط saeed.code_x برای جامعه فارسی‌زبان</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
